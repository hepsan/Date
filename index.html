<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En viktig fråga</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe6f2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        img {
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #d63384;
            margin: 20px 0;
            font-size: 2.5rem;
            text-align: center;
        }

        .button-container {
            position: relative;
            width: 300px;
            height: 100px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        button {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #btn-yes {
            background-color: #4CAF50;
            color: white;
            z-index: 2;
        }

        #btn-yes:hover {
            background-color: #45a049;
        }

        #btn-no {
            background-color: #f44336;
            color: white;
            position: absolute;
            right: 20px;
            transition: left 0.2s ease, top 0.2s ease;
        }
    </style>
</head>
<body>

    <img src="https://media.tenor.com/B94S_3nO_-sAAAAi/cat-heart.gif" alt="Gullig katt med hjärtan">
    
    <h1>Vill du gå på dejt med mig?</h1>
    
    <div class="button-container">
        <button id="btn-yes">Ja</button>
        <button id="btn-no">Nej</button>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        let isAbsolute = false;

        btnNo.addEventListener('mouseover', () => {
            if (!isAbsolute) {
                btnNo.style.position = 'fixed';
                isAbsolute = true;
            }

            const yesRect = btnYes.getBoundingClientRect();
            const noRect = btnNo.getBoundingClientRect();
            
            const targetX = yesRect.left + yesRect.width / 2;
            const targetY = yesRect.top + yesRect.height / 2;
            
            const currentX = noRect.left + noRect.width / 2;
            const currentY = noRect.top + noRect.height / 2;
            
            let newX = currentX + (targetX - currentX) * 0.4 + (Math.random() - 0.5) * 150;
            let newY = currentY + (targetY - currentY) * 0.4 + (Math.random() - 0.5) * 150;
            
            newX = Math.max(10, Math.min(newX, window.innerWidth - noRect.width - 10));
            newY = Math.max(10, Math.min(newY, window.innerHeight - noRect.height - 10));
            
            btnNo.style.left = newX + 'px';
            btnNo.style.top = newY + 'px';
        });

        // Skickar vidare till kalender.html när muspekaren nuddar "Ja"
        btnYes.addEventListener('mouseenter', () => {
            window.location.href = 'kalender.html';
        });
    </script>

</body>
</html>
